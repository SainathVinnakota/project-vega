version: '3.8'

services:
  vega-platform:
    build:
      context: .
      target: api # Uses the FastAPI/UI configuration
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app # Allows for hot-reloading code changes
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
